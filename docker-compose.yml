services:
  postgres-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: microservices_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microservices_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/microservices_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres-db:
        condition: service_healthy

  product-service:
    build: ./product-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/microservices_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres-db:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/microservices_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres-db:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
      analytics-service:
        condition: service_started

  payment-service:
    build: ./payment-service
    ports:
      - "5001:5001"

  notification-service:
    build: ./notification-service
    ports:
      - "5002:5002"

  analytics-service:
    build: ./analytics-service
    ports:
      - "5003:5003"

  frontend:
    build: ./order-frontend
    ports:
      - "3000:80"
    depends_on:
      user-service:
        condition: service_started
      order-service:
        condition: service_started

volumes:
  postgres-data:
